name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run mobile lib tests
        run: npm test

      - name: Install mobile app dependencies
        working-directory: mobile/rider-app
        run: npm ci

      - name: Typecheck mobile app
        working-directory: mobile/rider-app
        run: npm run typecheck
